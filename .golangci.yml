# .golangci.yml — golangci-lint configuration
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  # Test files are linted with a slightly different rule set (see overrides).
  tests: true

output:
  # Skip generated files and vendored code.
  exclude-files:
    - ".*\\.pb\\.go$"

linters:
  # Start from an empty set and explicitly opt-in so upgrades don't silently
  # add new linters that break the build.
  disable-all: true
  enable:
    # ── Correctness ────────────────────────────────────────────────────────
    - errcheck # every error return must be checked
    - govet # suspicious constructs (shadow, printf format, etc.)
    - staticcheck # SA*, S1*, QF* checks (superset of go vet)
    - unused # unused code
    - ineffassign # assigned values never used
    - bodyclose # HTTP response body must be closed
    - nilerr # return nil with non-nil error
    - reassign # reassign of package-level vars

    # ── Style / best practice ──────────────────────────────────────────────
    - gofmt # standard formatting
    - goimports # import grouping and ordering
    - misspell # common English spelling mistakes
    - godot # comment sentences end with a period
    - whitespace # unnecessary blank lines
    - unconvert # unnecessary type conversions

    # ── Security ──────────────────────────────────────────────────────────
    - gosec # OWASP-aligned security checks

    # ── Complexity / maintainability ──────────────────────────────────────
    - cyclop # cyclomatic complexity
    - gocognit # cognitive complexity

linters-settings:
  errcheck:
    # Allow ignoring errors from fmt.Print* functions (common in CLIs).
    exclude-functions:
      - fmt.Print
      - fmt.Println
      - fmt.Printf
      - fmt.Fprint
      - fmt.Fprintln
      - fmt.Fprintf
    check-type-assertions: true

  govet:
    enable:
      - shadow # shadowed variables are a common source of bugs

  gosec:
    excludes:
      # G304: File path provided as taint input — we intentionally accept user
      # file paths in both the CLI and the HTTP handler.
      - G304

  cyclop:
    max-complexity: 15

  gocognit:
    min-complexity: 20

  misspell:
    locale: US

  godot:
    scope: declarations

issues:
  # Don't report the same issue more than once.
  max-same-issues: 0

  exclude-rules:
    # Test files: relax some rules that don't apply in test helpers.
    - path: "_test\\.go"
      linters:
        - errcheck # t.Fatal/t.Error return values needn't be checked
        - gosec # test fixtures use hard-coded credentials by design
        - godot # test function names and table entries skip punctuation

    # Allow long lines in template constants in generator.go.
    - path: "internal/generator/generator\\.go"
      linters:
        - lll
